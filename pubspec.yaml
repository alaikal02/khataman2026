name: khataman_quran
description: Khataman Quran Tracking App
publish_to: 'none'
version: 1.14.6+49
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  provider: ^6.1.1
  google_sign_in: ^6.1.6
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^17.2.2
  flutter_dotenv: ^5.1.0
  quran: ^1.2.4
  share_plus: ^13.1.0
  app_links: ^7.1.1
  adhan_dart: ^2.0.1
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  flutter_qiblah: ^3.2.0
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  audioplayers: ^6.7.1
  package_info_plus: ^10.1.0
  home_widget: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/app_icon.png
    - assets/images/app_icon_dark.png
    - assets/images/adaptive_foreground.png
    - assets/images/google_logo.png
    - assets/audio/azan_makkah.mp3
    - assets/audio/azan_madinah.mp3

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: LPMQ-IsepMisbah
      fonts:
        - asset: assets/fonts/LPMQ-IsepMisbah.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  
  # Adaptive Icon Android (Light / Dark mode & Material You support)
  adaptive_icon_background: "#2ECC71"
  adaptive_icon_background_dark: "#102A1E"
  adaptive_icon_foreground: "assets/images/adaptive_foreground.png"
  adaptive_icon_monochrome: "assets/images/adaptive_foreground.png"
  
  # iOS 18+ Adaptive/Dark/Tinted icon support
  image_path_ios_dark_transparent: "assets/images/adaptive_foreground.png"
  image_path_ios_tinted_grayscale: "assets/images/adaptive_foreground.png"
  desaturate_tinted_to_grayscale_ios: true
  remove_alpha_ios: true

  web:
    generate: true
    image_path: "assets/images/app_icon.png"
