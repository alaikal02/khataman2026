name: Build Android APK

on:
  push:
    branches:
      - main # Ubah ke 'master' jika branch utama Anda bernama master

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Menambahkan environment variable untuk memaksa penggunaan Node 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      # 1. Ambil kode dari repository GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Java (Gunakan versi 17 sesuai perbaikan kita sebelumnya)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Install Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Buat .env dari GitHub Secrets (file ini di-gitignore, tidak ikut checkout)
      - name: Create .env for release build
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      # 5. Ambil semua library/dependencies pubspec.yaml
      - name: Install dependencies
        run: flutter pub get

      # 6. Build APK Mode Release
      - name: Build APK
        run: flutter build apk --release

      # 7. Upload file APK agar bisa di-download di GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
