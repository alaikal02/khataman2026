<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Khataman Quran Tracking App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="khataman_quran">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Khataman Quran</title>
  <link rel="manifest" href="manifest.json">

  <script>
    (function() {
      var theme = localStorage.getItem('flutter.theme_mode');
      var isDark = true;
      if (theme === '1') { // ThemeMode.light
        isDark = false;
      } else if (theme === '0' || theme === null) { // ThemeMode.system or not set
        isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      if (!isDark) {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>

  <style>
    body {
      background-color: #0D1117;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    
    .splash-container {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #091a13 0%, #0D1117 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .logo-box {
      width: 120px;
      height: 120px;
      background-color: #2ECC71;
      border-radius: 32px;
      box-shadow: 0 0 35px rgba(46, 204, 113, 0.35);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 48px;
      animation: pulse 1.8s infinite ease-in-out;
    }
    
    .logo-icon {
      width: 60px;
      height: 60px;
      fill: white;
    }
    
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(46, 204, 113, 0.15);
      border-top: 3px solid #2ECC71;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      margin-bottom: 24px;
    }
    
    .loading-text {
      color: #8B949E;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.1px;
    }

    /* Light Theme Styling Overrides */
    .light-theme body {
      background-color: #F5F5F5;
    }
    
    .light-theme .splash-container {
      background: linear-gradient(135deg, #EBFDF3 0%, #F5F5F5 100%);
    }
    
    .light-theme .logo-box {
      background-color: #2ECC71;
      box-shadow: 0 0 35px rgba(46, 204, 113, 0.2);
    }
    
    .light-theme .spinner {
      border: 3px solid rgba(46, 204, 113, 0.1);
      border-top: 3px solid #1A8A4A;
    }
    
    .light-theme .loading-text {
      color: #1A8A4A;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.03); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="splash-container" id="splash-screen">
    <div class="logo-box">
      <!-- SVG of open book -->
      <svg class="logo-icon" viewBox="0 0 24 24">
        <path d="M12,11.55C11.2,10.67 9.97,10 8.5,10C6.96,10 5.54,10.74 5,11.83V19.83C5.54,18.74 6.96,18 8.5,18C9.97,18 11.2,18.67 12,19.55C12.8,18.67 14.03,18 15.5,18C17.04,18 18.46,18.74 19,19.83V11.83C18.46,10.74 17.04,10 15.5,10C14.03,10 12.8,10.67 12,11.55M19,9.3C18.1,8.5 16.9,8 15.5,8C13.9,8 12.5,8.7 11.5,9.8C10.5,8.7 9.1,8 7.5,8C6.1,8 4.9,8.5 4,9.3V21C4.9,20.2 6.1,19.7 7.5,19.7C9.1,19.7 10.5,20.4 11.5,21.5C12.5,20.4 13.9,19.7 15.5,19.7C16.9,19.7 18.1,20.2 19,21V9.3Z"/>
      </svg>
    </div>
    <div class="spinner"></div>
    <div class="loading-text">Memuat perjalanan spiritual Anda...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
